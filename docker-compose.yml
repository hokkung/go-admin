services:
  postgres:
    image: postgres:16-alpine
    container_name: go-admin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: go_admin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d go_admin"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
